
name: Backend Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  unit-property-tests:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    - name: Use Node.js 18
      uses: actions/setup-node@v3
      with:
        node-version: 18
        cache: 'npm'
        cache-dependency-path: backend/package-lock.json
    - name: Install Dependencies
      run: npm install
      working-directory: ./backend
    - name: Run Unit and Property Tests
      run: |
        npm run test:unit
        npm run test:property
      working-directory: ./backend
      env:
        NODE_ENV: test
        JWT_SECRET: test-secret
        MONGODB_URI: mongodb://localhost:27017/test
        REDIS_URL: redis://localhost:6379

  integration-tests:
    runs-on: ubuntu-latest
    services:
      mongodb:
        image: mongo:latest
        ports:
        - 27017:27017
      redis:
        image: redis:latest
        ports:
        - 6379:6379
    steps:
    - uses: actions/checkout@v3
    - name: Use Node.js 18
      uses: actions/setup-node@v3
      with:
        node-version: 18
        cache: 'npm'
        cache-dependency-path: backend/package-lock.json
    - name: Install Dependencies
      run: npm install
      working-directory: ./backend
    - name: Run Integration Tests
      run: npm run test:integration
      working-directory: ./backend
      env:
        NODE_ENV: test
        JWT_SECRET: test-secret
        MONGODB_URI: mongodb://localhost:27017/test
        REDIS_URL: redis://localhost:6379

  security-tests:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    - name: Use Node.js 18
      uses: actions/setup-node@v3
      with:
        node-version: 18
        cache: 'npm'
        cache-dependency-path: backend/package-lock.json
    - name: Install Dependencies
      run: npm install
      working-directory: ./backend
    - name: Run Security Tests
      run: npm run test:security
      working-directory: ./backend
      env:
        NODE_ENV: test
        JWT_SECRET: test-secret
        MONGODB_URI: mongodb://localhost:27017/test
        REDIS_URL: redis://localhost:6379

  upload-reports:
    runs-on: ubuntu-latest
    needs: [unit-property-tests, integration-tests, security-tests]
    if: always()
    steps:
    - uses: actions/checkout@v3
    - name: Use Node.js 18
      uses: actions/setup-node@v3
      with:
        node-version: 18
        cache: 'npm'
        cache-dependency-path: backend/package-lock.json
    - name: Install Dependencies
      run: npm install
      working-directory: ./backend
    - name: Generate Reports
      run: npm run test:ci
      working-directory: ./backend
      continue-on-error: true
      env:
        NODE_ENV: test
        JWT_SECRET: test-secret
        MONGODB_URI: mongodb://localhost:27017/test
        REDIS_URL: redis://localhost:6379
    - name: Upload Coverage Report
      uses: actions/upload-artifact@v3
      with:
        name: coverage-report
        path: backend/coverage/
    - name: Upload Test Results
      uses: actions/upload-artifact@v3
      with:
        name: test-results
        path: backend/test-results/
