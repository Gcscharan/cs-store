name: CI Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  backend:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build backend
        run: npm run build

  frontend:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Run logic tests (coverage enforced)
        run: npm run test:logic

      - name: Build frontend
        run: npm run build

      - name: Enforce bundle size limit
        run: |
          FILE=$(ls dist/assets/page-home-*.js | head -n 1)
          SIZE=$(stat -c%s "$FILE")
          MAX=563200
          echo "Bundle size: $SIZE bytes"
          if [ "$SIZE" -gt "$MAX" ]; then
            echo "Bundle too large!"
            exit 1
          fi

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps

      - name: Start dev server
        run: nohup npm run dev -- --port 5173 > dev.log 2>&1 &

      - name: Wait for server
        run: npx wait-on http://localhost:5173 --timeout 60000

      - name: Run E2E tests
        run: npm run e2e

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: frontend/coverage

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: frontend/playwright-report
